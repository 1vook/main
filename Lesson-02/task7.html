<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 7</title>

    <script>
      let month = Math.floor(Math.random() * 12 + 1);
      let day = Math.floor(Math.random() * 7);
      let sum = month + day;
      document.write(`
      <ul>
   <li>Рандомний місяць: ${month}</li>
   <li>Рандомний день: ${day}</li>
   <li>Сума: ${sum}</li>
</ul>`);
    </script>
  </head>
  <body></body>
</html>
