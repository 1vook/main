<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 5</title>
    <script>
      let sec = parseInt(prompt(`Скільки секунд пройшло з початку доби?`, 367));
      let minutes = sec / 60;
      let hours = minutes / 60;
      document.write(
        `<ul>
   <li>
      Це - ${minutes} хвилин.
   </li>
   <li>
      Та - ${hours} годин.
   </li>
</ul>`,
      );
    </script>
  </head>
  <body></body>
</html>
