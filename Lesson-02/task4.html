<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 4</title>

    <script>
      let length = parseInt(prompt(`Вкажіть довжину у сантиметрах`, 30));
      let meters = length * 100;
      let kilometers = length * 1000;
      document.write(`<ul>
   <li>
      Це - ${meters} метрів
   </li>
   <li>
      Та - ${kilometers} кілометрів
   </li>
</ul>`);
    </script>
  </head>
  <body></body>
</html>
