<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 3</title>
    <script>
      let quantity = parseInt(prompt(`Скільки товару Ви маэте?`, 20));
      let cost = parseInt(prompt(`А яка у нього ціна?`, 120));
      let sum = quantity * cost;
      let tax = sum * 0.05;
      document.write(`Що ж, ваш відсоток ПДВ буде становити ${tax} гривень.`);
    </script>
  </head>
  <body></body>
</html>
