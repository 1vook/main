    <div><img src="../src/img/triangle.jpg" alt="triangle" /></div> -->
    <script>
      // Зобразити рівнобедрений трикутник із символів ^. Висоту задає користувач.
      const height = parseInt(prompt(`Введіть висоту трикутника`, "6"))
      document.write(`<div style="text-align: center;">`)
      for (let h = 1; h <= height; h++) {
        for (let s = 0; s < h; s++) {
          document.write("^")
        }
        document.write(`<br>`)
      }
      document.write(`</div>`)
    </script>
  </body>
