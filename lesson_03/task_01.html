<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 1.	З клавіатури вводяться імена двох дітей та кількість у них цукерок. Вивести не екран ім’я тієї дитини, у якої кількість цукерок є більшою, або вивести, що кількість однакова.

      const chieldName1 = prompt(`Введіть ім'я першої дитини`, `Olevir`);
      const chieldName2 = prompt(`Введіть ім'я другої дитини`, `Petro`);
      const chieldName1Candy = parseFloat(
        prompt(`Введіть скільки цукерок має ${chieldName1}`, "3"),
      );
      const chieldName2Candy = parseFloat(
        prompt(`Введіть скільки цукерок має ${chieldName2}`, "4"),
      );
      if (chieldName1Candy === chieldName2Candy)
        document.write(`Кількість цукерок однакова`);
      else if (chieldName1Candy > chieldName2Candy)
        document.write(`У ${chieldName1} цукерок більше - ${chieldName1Candy}`);
      else
        document.write(`У ${chieldName2} цукерок більше - ${chieldName2Candy}`);
    </script>
    <title>1</title>
  </head>
  <body></body>
</html>
