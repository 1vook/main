<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6</title>
    <script>
      // –Ч –Ї–ї–∞–≤—Ц–∞—В—Г—А–Є –≤–≤–Њ–і–Є—В—М—Б—П –љ–Њ–Љ–µ—А –і–љ—П —В–Є–ґ–љ—П. –Т–Є–≤–µ—Б—В–Є –љ–∞ –µ–Ї—А–∞–љ –љ–∞–Ј–≤—Г –і–љ—П.
      const dayNumber = parseInt(prompt(`–Т–≤–µ–і—Ц—В—М –љ–Њ–Љ–µ—А –і–љ—П —В–Є–ґ–љ—П`, "2"));
      switch (dayNumber) {
        case 1:
          document.write(`–Я–Њ–љ–µ–і—Ц–ї–Њ–Ї`);
          break;

        case 2:
          document.write(`–Т—Ц–≤—В–Њ—А–Њ–Ї`);
          break;

        case 3:
          document.write(`–°–µ—А–µ–і–∞`);
          break;

        case 4:
          document.write(`–І–µ—В–≤–µ—А`);
          break;

        case 5:
          document.write(`–Я'—П—В–љ–Є—Ж—П`);
          break;

        case 6:
          document.write(`–°—Г–±–Њ—В–∞`);
          break;

        case 7:
          document.write(`–Э–µ–і—Ц–ї—П`);
          break;

        default:
          document.write(
            `–Ю–љ–Њ–≤–Є —Б—В–Њ—А—Ц–љ–Ї—Г —В–∞ –≤–≤–µ–і–Є —Ж–Є—Д—А—Г –≤—Ц–і–њ–Њ–≤—Ц–і–љ–Њ –і–Њ –љ–Њ–Љ–µ—А–∞ –і–љ—П —В–Є–ґ–љ—П, –≤—Ц–і 1 –і–Њ 7`,
          );
          break;
      }
    </script>
  </head>
  <body></body>
</html>
