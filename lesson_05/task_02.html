<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02</title>
    <script>
      // Вивести з використанням циклів маркований список з випадковими числами (1-100). Кількість випадкових чисел вводиться користувачем. Приклад:
      if (confirm("Почати тестування?")) {
        const randomNumber = parseInt(
          prompt(`Введіть скільки ви хочите вивести випадкових чисел`, "12"),
        )
        document.write("<ul>")
        for (let i = 0; i < randomNumber; i++) {
          let number = Math.floor(Math.random() * 100) + 1
          document.write(`<li>${number}</li>`)
        }
        document.write("</ul>")
      }
    </script>
  </head>
  <body></body>
</html>
