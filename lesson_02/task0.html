<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 0</title>
    <script>
      let a = parseInt(prompt(`Доброго дня, введіть значення "а"`, 3));
      let b = parseInt(prompt(`А тепер введіть значення "b"`, 5));
      let c = parseInt(prompt(`І останнє "с"`, 8));
      let s1 = a + 12 + b;
      let s2 = Math.sqrt((a + b) / (2 * a));
      let s3 = Math.cbrt((a + b) * c);
      let s4 = Math.sin(a / -b);
      document.write(`
  <ul>
    <li>S1 = ${s1}</li>
    <li>S2 = ${s2}</li>
    <li>S3 = ${s3}</li>
    <li>S4 = ${s4}</li>
  </ul>
`);
    </script>
  </head>
  <body></body>
</html>
