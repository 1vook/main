<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача № 1</title>
    <script>
      let a = parseInt(prompt(`Доброго дня, введіть значення "а"`, 3));
      let b = parseInt(prompt(`А тепер введіть значення "b"`, 5));
      let sum = a + b;
      let multiplication = a * b;
      let division = a / b;

      document.write(
        `<ul><li>Cума числе = ${sum}</li><li>Добуток чисел = ${multiplication}</li> <li>Частка a від b = ${division}</li></ul>`,
      );
    </script>
  </head>
  <body></body>
</html>
